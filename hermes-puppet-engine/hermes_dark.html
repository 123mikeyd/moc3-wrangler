<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hermes Puppet — hermes_dark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #c0c0c0; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; font-size: 16px; }
        #viewport { flex: 1; position: relative; background: #111; }
        #puppet-canvas { width: 100%; height: 100%; }
        #sidebar { width: 420px; background: #0d0d0d; border-left: 2px solid #222; overflow-y: auto; padding: 20px; }
        h2 { color: #4080ff; font-size: 18px; letter-spacing: 2px; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #222; }
        h2:first-child { margin-top: 0; }
        .slider-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
        .slider-row label { width: 100px; font-size: 13px; color: #aaa; text-align: right; flex-shrink: 0; }
        .slider-row input[type="range"] { flex: 1; height: 6px; accent-color: #4080ff; cursor: pointer; }
        .slider-value { width: 50px; font-size: 13px; color: #4080ff; text-align: right; }
        #status { position: absolute; top: 12px; left: 12px; font-size: 14px; color: #888; background: rgba(0,0,0,0.8); padding: 8px 14px; border-radius: 6px; }
        .btn { background: #1a1a2a; border: 2px solid #333; color: #ccc; padding: 8px 14px; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; border-radius: 6px; margin: 3px; font-weight: bold; }
        .btn:hover { border-color: #4080ff; color: #fff; background: #1a2a4a; }
        .btn:active { background: #2a3a5a; }
    </style>
</head>
<body>
    <div id="viewport">
        <div id="puppet-canvas"></div>
        <div id="status">Loading...</div>
    </div>
    <div id="sidebar">
        <h2>🎭 HERMES DARK</h2>
        <div style="font-size:13px;color:#555;margin-bottom:10px;">
            Live2D-style puppet — 5 textures, 16 bones, 45 params
        </div>

        <h2>⚡ PRESETS</h2>
        <div>
            <button class="btn" onclick="puppet.setPreset({PARAM_ANGLE_X:0,PARAM_ANGLE_Y:0,PARAM_BODY_X:0,PARAM_ARM_L:0,PARAM_ARM_R:0})">Neutral</button>
            <button class="btn" onclick="puppet.setPreset({PARAM_ANGLE_X:-20,PARAM_ANGLE_Y:5,PARAM_EYE_BALL_X:-0.5})">Look Left</button>
            <button class="btn" onclick="puppet.setPreset({PARAM_ANGLE_X:20,PARAM_ANGLE_Y:5,PARAM_EYE_BALL_X:0.5})">Look Right</button>
            <button class="btn" onclick="puppet.setPreset({PARAM_ARM_L:2,PARAM_ARM_R:2})">Arms Out</button>
            <button class="btn" onclick="puppet.setPreset({PARAM_EYE_L_OPEN:0,PARAM_EYE_R_OPEN:1})">Wink</button>
            <button class="btn" onclick="puppet.setPreset({PARAM_MOUTH_OPEN_Y:0.8})">Mouth Open</button>
            <button class="btn" onclick="puppet.setPreset({PARAM_TERE:1})">Blush</button>
            <button class="btn" onclick="resetAll()">Reset</button>
        </div>

        <h2>📌 PARAMETERS</h2>
        <div id="slider-panel">Loading...</div>

        <h2>📊 INFO</h2>
        <div id="info-panel" style="font-size:13px;color:#555;">—</div>
    </div>

    <script src="./dist/hermes_dark.js"></script>
    <script>
        puppet.init('puppet-canvas');
        document.getElementById('status').textContent = 'Loading hermes_dark...';
        puppet.loadHermesDark().then(() => {
            document.getElementById('status').textContent = 'hermes_dark loaded — click bones to drag';
        }).catch(e => {
            document.getElementById('status').textContent = 'Error: ' + e.message;
        });

        function resetAll() {
            const defaults = {PARAM_ANGLE_X:0,PARAM_ANGLE_Y:0,PARAM_ANGLE_Z:0,PARAM_BODY_X:0,PARAM_BODY_Y:0,PARAM_BODY_Z:0,PARAM_ARM_L:0,PARAM_ARM_L_02:0,PARAM_HAND_L:0,PARAM_ARM_R:0,PARAM_ARM_R_02:0,PARAM_HAND_R:0,PARAM_ARM_02_L_01:0,PARAM_ARM_02_L_02:0,PARAM_HAND_02_L:0,PARAM_ARM_02_R_01:0,PARAM_ARM_02_R_02:0,PARAM_HAND_02_R:0,PARAM_EYE_L_OPEN:0.85,PARAM_EYE_R_OPEN:0.85,PARAM_EYE_BALL_X:0,PARAM_EYE_BALL_Y:0,PARAM_MOUTH_OPEN_Y:0,PARAM_MOUTH_FORM:0,PARAM_BROW_L_Y:0,PARAM_BROW_R_Y:0,PARAM_BREATH:0,PARAM_TERE:0,PARAM_DESK:0};
            puppet.setPreset(defaults);
        }
    </script>
</body>
</html>
